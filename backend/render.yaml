services:
  - type: web
    name: aws-dashboard
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn aws_dashboard.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: aws-db
          property: connectionString

databases:
  - name: aws-db
    plan: free